version: "3.9"

services:
  portainer:
    image: portainer/portainer-ce:2.21.3
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    networks:
      - backend_network

networks:
  backend_network:
    external: true
