services:
  backend:
    build:
      context: ./back
    container_name: dissertation-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      search-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./volumes/backend-storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend_network
      - services_network
      - database_network

  frontend:
    build:
      context: ./front
    container_name: dissertation-frontend
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - proxy_network
      - backend_network

  search-service:
    build:
      context: ./services/search-service
    container_name: dissertation-search-service
    env_file:
      - .env
    depends_on:
      elasticsearch:
        condition: service_started
    ports:
      - "${SEARCH_SERVICE_PORT:-8001}:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - services_network
      - database_network

  ai-service:
    build:
      context: ./services/ai-service
    container_name: dissertation-ai-service
    env_file:
      - .env
    depends_on:
      search-service:
        condition: service_healthy
    ports:
      - "${AI_SERVICE_PORT:-8002}:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - services_network

  integration-service:
    build:
      context: ./services/integration-service
    container_name: dissertation-integration-service
    env_file:
      - .env
    ports:
      - "${INTEGRATION_SERVICE_PORT:-8003}:8003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - services_network

  postgres:
    image: postgres:16
    container_name: dissertation-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dissertation_registry}
      POSTGRES_USER: ${POSTGRES_USER:-registry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-registry_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-registry_user} -d ${POSTGRES_DB:-dissertation_registry}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./volumes/postgres-data/data:/var/lib/postgresql/data
      - ./databases/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - database_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: dissertation-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elasticpassword}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    restart: unless-stopped
    volumes:
      - ./volumes/elastic-data:/usr/share/elasticsearch/data
      - ./databases/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    networks:
      - database_network

  redis:
    image: redis:7-alpine
    container_name: dissertation-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - ./volumes/redis-data:/data
      - ./databases/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - database_network

networks:
  proxy_network:
    name: proxy_network
    driver: bridge
  backend_network:
    name: backend_network
    driver: bridge
  services_network:
    name: services_network
    driver: bridge
  database_network:
    name: database_network
    driver: bridge
