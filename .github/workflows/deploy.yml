name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: 'Force rebuild all services'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # 1. TypeScript / Lint tekshiruvi
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: front

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: front

      - name: ESLint check
        run: npx next lint --max-warnings 20
        working-directory: front

  # ──────────────────────────────────────────────
  # 2. Backend syntax check
  # ──────────────────────────────────────────────
  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Python syntax
        run: |
          find back -name "*.py" | xargs python -m py_compile
          echo "Backend syntax OK"

  # ──────────────────────────────────────────────
  # 3. Production Deploy
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [lint, backend-check]
    environment: production
    steps:
      - name: Checkout (for changed files detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event.inputs.force_rebuild_all }}" = "true" ]; then
            echo "frontend=true"  >> $GITHUB_OUTPUT
            echo "backend=true"   >> $GITHUB_OUTPUT
            echo "search=true"    >> $GITHUB_OUTPUT
            echo "ai=true"        >> $GITHUB_OUTPUT
            echo "integration=true" >> $GITHUB_OUTPUT
            echo "force=true"     >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"

          echo "frontend=$(echo "$CHANGED"    | grep -q '^front/'                      && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "backend=$(echo "$CHANGED"     | grep -q '^back/'                       && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "search=$(echo "$CHANGED"      | grep -q '^services/search-service/'   && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "ai=$(echo "$CHANGED"          | grep -q '^services/ai-service/'       && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "integration=$(echo "$CHANGED" | grep -q '^services/integration-service/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "force=false" >> $GITHUB_OUTPUT

      - name: Show what will be rebuilt
        run: |
          echo "Frontend:    ${{ steps.changes.outputs.frontend }}"
          echo "Backend:     ${{ steps.changes.outputs.backend }}"
          echo "Search:      ${{ steps.changes.outputs.search }}"
          echo "AI:          ${{ steps.changes.outputs.ai }}"
          echo "Integration: ${{ steps.changes.outputs.integration }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd /opt/dissertation-reestr

            echo "=== [1/5] Git pull ==="
            git pull origin main

            echo "=== [2/5] Detect & build changed services ==="
            BUILD_SERVICES=""

            FRONTEND="${{ steps.changes.outputs.frontend }}"
            BACKEND="${{ steps.changes.outputs.backend }}"
            SEARCH="${{ steps.changes.outputs.search }}"
            AI="${{ steps.changes.outputs.ai }}"
            INTEGRATION="${{ steps.changes.outputs.integration }}"
            FORCE="${{ steps.changes.outputs.force }}"

            [ "$FRONTEND"    = "true" ] && BUILD_SERVICES="$BUILD_SERVICES frontend"
            [ "$BACKEND"     = "true" ] && BUILD_SERVICES="$BUILD_SERVICES backend"
            [ "$SEARCH"      = "true" ] && BUILD_SERVICES="$BUILD_SERVICES search-service"
            [ "$AI"          = "true" ] && BUILD_SERVICES="$BUILD_SERVICES ai-service"
            [ "$INTEGRATION" = "true" ] && BUILD_SERVICES="$BUILD_SERVICES integration-service"

            if [ -z "$BUILD_SERVICES" ] && [ "$FORCE" != "true" ]; then
              echo "No service source files changed. Running docker compose up -d only."
              docker compose up -d
            else
              echo "Building:$BUILD_SERVICES"
              docker compose build $BUILD_SERVICES
              docker compose up -d
            fi

            echo "=== [3/5] Wait for containers to be healthy ==="
            sleep 15

            echo "=== [4/5] Health checks ==="
            FAIL=0
            for endpoint in \
              "http://localhost:8000/api/v1/health" \
              "http://localhost:8001/health" \
              "http://localhost:8002/health" \
              "http://localhost:8003/health" \
              "http://localhost:3000"
            do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$endpoint" || echo "000")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
                echo "  OK  $endpoint ($STATUS)"
              else
                echo "  FAIL $endpoint ($STATUS)"
                FAIL=1
              fi
            done

            if [ $FAIL -ne 0 ]; then
              echo "Health check failed!"
              docker compose ps
              exit 1
            fi

            echo "=== [5/5] All services healthy ==="
            docker compose ps --format "table {{.Name}}\t{{.Status}}"
            echo "Deploy complete: $(date)"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deploy muvaffaqiyatli: $(date)"
          echo "   Commit: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Actor:  ${{ github.actor }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deploy MUVAFFAQIYATSIZ: $(date)"
          echo "   Commit: ${{ github.sha }}"
